name: Keep workflows alive

# GitHub pauses scheduled workflows after 60 days of no repo activity.
# This workflow runs on the 1st of each month, makes a trivial commit,
# and keeps the collection schedule active indefinitely.

on:
  schedule:
    - cron: '0 6 1 * *'   # 06:00 UTC on the 1st of each month
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Touch keepalive marker
        run: |
          date -u > .keepalive
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git commit -m "chore: monthly keepalive [skip ci]"
          git push
